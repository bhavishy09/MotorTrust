{% extends "layout.html" %}

{% block title %}Sign Up - Car Price Predictor{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 mb-20">
    <div class="bg-white p-10 rounded-2xl border border-brand-border shadow-sm">
        <h2 class="text-3xl font-extrabold text-center mb-8 text-brand-dark tracking-tight">Create Account</h2>
        <form method="POST" action="{{ url_for('signup') }}">
            <div class="mb-5">
                <label for="username" class="block text-gray-700 mb-2 font-medium">Username</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-brand-primary focus:border-transparent transition-all">
            </div>
            <div class="mb-5">
                <label for="email" class="block text-gray-700 mb-2 font-medium">Email</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-brand-primary focus:border-transparent transition-all">
            </div>
            <div class="mb-5">
                <label for="password" class="block text-gray-700 mb-2 font-medium">Password</label>
                <input type="password" id="password" name="password" required minlength="6"
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-brand-primary focus:border-transparent transition-all">
                <p class="text-sm text-gray-500 mt-1.5">Minimum 6 characters</p>
            </div>
            <div class="mb-8">
                <label for="confirm_password" class="block text-gray-700 mb-2 font-medium">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-brand-primary focus:border-transparent transition-all">
            </div>
            <button type="submit" class="w-full bg-brand-primary hover:bg-brand-hover text-white py-3.5 rounded-lg font-medium transition-colors shadow-md text-lg">
                Create Account
            </button>
        </form>
        <p class="text-center mt-8 text-gray-600">
            Already have an account? <a href="{{ url_for('login') }}" class="text-brand-primary hover:underline font-semibold ml-1">Log in here</a>
        </p>
    </div>
</div>
{% endblock %}
