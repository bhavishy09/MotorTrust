{% extends "layout.html" %}

{% block title %}Sign Up - Car Price Predictor{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-gray-900 p-8 rounded-lg border-2 border-gray-700 shadow-xl">
        <h2 class="text-3xl font-bold text-center mb-6 text-car-red">Create Account</h2>
        <form method="POST" action="{{ url_for('signup') }}">
            <div class="mb-6">
                <label for="username" class="block text-car-grey mb-2 font-semibold">Username</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-car-red transition-colors">
            </div>
            <div class="mb-6">
                <label for="email" class="block text-car-grey mb-2 font-semibold">Email</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-car-red transition-colors">
            </div>
            <div class="mb-6">
                <label for="password" class="block text-car-grey mb-2 font-semibold">Password</label>
                <input type="password" id="password" name="password" required minlength="6"
                       class="w-full px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-car-red transition-colors">
                <p class="text-sm text-car-grey mt-1">Minimum 6 characters</p>
            </div>
            <div class="mb-6">
                <label for="confirm_password" class="block text-car-grey mb-2 font-semibold">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
                       class="w-full px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-car-red transition-colors">
            </div>
            <button type="submit" class="w-full btn-primary py-3 text-lg">
                Sign Up
            </button>
        </form>
        <p class="text-center mt-6 text-car-grey">
            Already have an account? <a href="{{ url_for('login') }}" class="text-car-red hover:underline font-semibold">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
