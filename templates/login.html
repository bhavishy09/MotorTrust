{% extends "layout.html" %}

{% block title %}Login - Car Price Predictor{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 mb-20">
    <div class="bg-white p-10 rounded-2xl border border-brand-border shadow-sm">
        <h2 class="text-3xl font-extrabold text-center mb-8 text-brand-dark tracking-tight">Welcome Back</h2>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-6">
                <label for="username" class="block text-gray-700 mb-2 font-medium">Username</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-brand-primary focus:border-transparent transition-all">
            </div>
            <div class="mb-8">
                <label for="password" class="block text-gray-700 mb-2 font-medium">Password</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-brand-primary focus:border-transparent transition-all">
            </div>
            <button type="submit" class="w-full bg-brand-primary hover:bg-brand-hover text-white py-3.5 rounded-lg font-medium transition-colors shadow-md text-lg">
                Sign In
            </button>
        </form>
        <p class="text-center mt-8 text-gray-600">
            Don't have an account? <a href="{{ url_for('signup') }}" class="text-brand-primary hover:underline font-semibold ml-1">Sign up here</a>
        </p>
    </div>
</div>
{% endblock %}
